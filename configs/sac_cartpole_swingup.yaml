seed: 42

env:
  domain_name: cartpole
  task_name: swingup
  flatten_observation: true
  max_episode_steps: 500
  frame_width: 640
  frame_height: 480
  render_fps: 20

algorithm:
  name: SAC
  total_timesteps: 100000
  learning_rate: 0.0003
  buffer_size: 100000
  learning_starts: 5000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto
  target_update_interval: 1
  net_arch: [256, 256]

evaluation:
  eval_freq: 5000
  n_eval_episodes: 5
  deterministic: true
  success_reward_threshold: 400.0

logging:
  run_name: default_run
  latest_model_save_freq: 5000
  log_interval: 10

debug:
  check_env: true
  random_rollout_steps: 50
